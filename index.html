<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/thunder.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silent Thunder Squad | Tech Innovators</title>
    <meta name="description" content="Silent Thunder Squad - A collective of Computer Science students building innovative real-world solutions. Experience the future of tech." />
    <meta name="keywords" content="technology, innovation, computer science, software development, tech squad" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Silent Thunder Squad | Tech Innovators" />
    <meta property="og:description" content="A collective of Computer Science students building innovative real-world solutions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://silentthundersquad.com" />

    <!-- Preload critical fonts and assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Prevent FOUC -->
    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #050814;
        color: #ffffff;
        margin: 0;
        overflow-x: hidden;
      }

      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #050814 0%, #0f1629 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      .loading-thunder {
        font-size: 4rem;
        animation: pulse 1.5s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.8));
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-thunder">⚡</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
